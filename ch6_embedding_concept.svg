<svg xmlns="http://www.w3.org/2000/svg" width="850" height="450" viewBox="0 0 850 450">
  <!-- White background -->
  <rect width="850" height="450" fill="white"/>

  <!-- Title -->
  <text x="425" y="30" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#000">
    임베딩(Embedding)의 개념
  </text>

  <!-- Left section: Text inputs -->
  <g id="left-texts">
    <!-- Text box 1 -->
    <rect x="20" y="70" width="160" height="50" fill="#E8F4F8" stroke="#2E7D9E" stroke-width="2" rx="5"/>
    <text x="100" y="100" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#000">
      오늘 날씨가 좋다
    </text>

    <!-- Text box 2 -->
    <rect x="20" y="140" width="160" height="50" fill="#E8F4F8" stroke="#2E7D9E" stroke-width="2" rx="5"/>
    <text x="100" y="170" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#000">
      Today is sunny
    </text>

    <!-- Text box 3 -->
    <rect x="20" y="210" width="160" height="50" fill="#F0E8F8" stroke="#6E2E9E" stroke-width="2" rx="5"/>
    <text x="100" y="240" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#000">
      오늘 비가 온다
    </text>
  </g>

  <!-- Middle: Arrow and model label -->
  <g id="middle-arrow">
    <!-- Arrow -->
    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
        <polygon points="0 0, 10 3, 0 6" fill="#FF6B6B"/>
      </marker>
    </defs>

    <line x1="200" y1="145" x2="280" y2="145" stroke="#FF6B6B" stroke-width="3" marker-end="url(#arrowhead)"/>

    <!-- Model label -->
    <rect x="200" y="160" width="150" height="30" fill="#FFF3CD" stroke="#FF9800" stroke-width="1.5" rx="3"/>
    <text x="275" y="180" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#000" font-weight="bold">
      임베딩 모델
    </text>
    <text x="275" y="193" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">
      (Titan Embeddings)
    </text>
  </g>

  <!-- Right section: 2D Coordinate plane -->
  <g id="right-plot">
    <!-- Axes -->
    <line x1="380" y1="280" x2="750" y2="280" stroke="#333" stroke-width="2"/>
    <line x1="380" y1="280" x2="380" y2="80" stroke="#333" stroke-width="2"/>

    <!-- Axis labels -->
    <text x="760" y="300" font-family="Arial, sans-serif" font-size="10" fill="#666">차원 1</text>
    <text x="360" y="70" font-family="Arial, sans-serif" font-size="10" fill="#666">차원 2</text>

    <!-- Grid lines -->
    <line x1="500" y1="280" x2="500" y2="85" stroke="#EEE" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="620" y1="280" x2="620" y2="85" stroke="#EEE" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="380" y1="200" x2="745" y2="200" stroke="#EEE" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="380" y1="120" x2="745" y2="120" stroke="#EEE" stroke-width="1" stroke-dasharray="3,3"/>

    <!-- Point 1: "오늘 날씨가 좋다" -->
    <circle cx="520" cy="140" r="6" fill="#2E7D9E" stroke="#fff" stroke-width="2"/>
    <text x="520" y="165" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#2E7D9E" font-weight="bold">
      오늘 날씨가
    </text>
    <text x="520" y="176" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#2E7D9E" font-weight="bold">
      좋다
    </text>

    <!-- Point 2: "Today is sunny" -->
    <circle cx="540" cy="125" r="6" fill="#0099CC" stroke="#fff" stroke-width="2"/>
    <text x="540" y="105" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#0099CC" font-weight="bold">
      Today is sunny
    </text>

    <!-- Double arrow showing similarity -->
    <line x1="520" y1="115" x2="540" y2="130" stroke="#FF6B6B" stroke-width="2"/>
    <polygon points="540,130 535,125 538,118" fill="#FF6B6B"/>
    <polygon points="520,115 525,120 522,127" fill="#FF6B6B"/>

    <!-- Similarity label -->
    <rect x="480" y="95" width="120" height="25" fill="#FFE8E8" stroke="#FF6B6B" stroke-width="1" rx="3"/>
    <text x="540" y="108" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#C00">의미적으로 가까움</text>
    <text x="540" y="115" font-family="Arial, sans-serif" font-size="7" text-anchor="middle" fill="#666">(코사인 유사도 높음)</text>

    <!-- Point 3: "오늘 비가 온다" -->
    <circle cx="680" cy="230" r="6" fill="#6E2E9E" stroke="#fff" stroke-width="2"/>
    <text x="680" y="260" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#6E2E9E" font-weight="bold">
      오늘 비가 온다
    </text>

    <!-- Distance label -->
    <rect x="630" y="225" width="100" height="20" fill="#F0E8F8" stroke="#6E2E9E" stroke-width="1" rx="3"/>
    <text x="680" y="238" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#6E2E9E">의미적으로 멀음</text>
  </g>

  <!-- Bottom explanation -->
  <rect x="20" y="330" width="810" height="90" fill="#F5F5F5" stroke="#CCC" stroke-width="1" rx="5"/>
  <text x="425" y="355" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#000" font-weight="bold">
    텍스트 → 숫자 벡터 → 벡터 공간에서 의미 거리 측정
  </text>
  <text x="425" y="375" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#333">
    "오늘 날씨가 좋다"와 "Today is sunny"는 다른 언어지만 같은 의미를 가지므로 벡터 공간에서 가깝게 배치됨
  </text>
  <text x="425" y="400" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">
    예: [0.12, -0.45, 0.78, 0.33, ...] - 1024차원의 벡터로 표현
  </text>
</svg>
