<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="850" height="350" viewBox="0 0 850 350">
  <!-- White background -->
  <rect width="850" height="350" fill="white"/>

  <!-- Title -->
  <text x="425" y="30" font-family="Arial, sans-serif" font-size="22" font-weight="bold" text-anchor="middle" fill="#000">
    임베딩 생성 및 저장 파이프라인
  </text>

  <!-- Define gradient -->
  <defs>
    <linearGradient id="flowGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D946EF;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- STEP 1: Original Documents -->
  <g id="step1">
    <!-- Box -->
    <rect x="20" y="70" width="140" height="140" fill="#E3F2FD" stroke="#1976D2" stroke-width="2" rx="5"/>

    <!-- Header -->
    <rect x="20" y="70" width="140" height="30" fill="#1976D2" rx="5"/>
    <text x="90" y="92" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="white">
      단계 1: 원본 문서
    </text>

    <!-- Icons -->
    <g transform="translate(35, 110)">
      <!-- PDF icon -->
      <rect x="0" y="0" width="35" height="45" fill="white" stroke="#D32F2F" stroke-width="1.5" rx="2"/>
      <text x="17.5" y="28" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#D32F2F" font-weight="bold">PDF</text>
    </g>

    <g transform="translate(65, 110)">
      <!-- Word icon -->
      <rect x="0" y="0" width="35" height="45" fill="white" stroke="#2E7D9E" stroke-width="1.5" rx="2"/>
      <text x="17.5" y="28" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#2E7D9E" font-weight="bold">Word</text>
    </g>

    <!-- Label -->
    <text x="90" y="175" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#666">
      문서 파일
    </text>
  </g>

  <!-- ARROW 1 -->
  <line x1="170" y1="140" x2="210" y2="140" stroke="url(#flowGradient)" stroke-width="4"/>
  <polygon points="210,140 200,135 200,145" fill="url(#flowGradient)"/>

  <!-- STEP 2: Text Extraction & Chunking -->
  <g id="step2">
    <!-- Box -->
    <rect x="210" y="70" width="140" height="140" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="2" rx="5"/>

    <!-- Header -->
    <rect x="210" y="70" width="140" height="30" fill="#7B1FA2" rx="5"/>
    <text x="280" y="92" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="white">
      단계 2: 텍스트
    </text>
    <text x="280" y="105" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="white">
      추출 & 청킹
    </text>

    <!-- Scissors icon (simple) -->
    <g transform="translate(245, 115)">
      <line x1="15" y1="0" x2="15" y2="30" stroke="#7B1FA2" stroke-width="2"/>
      <circle cx="10" cy="15" r="4" fill="none" stroke="#7B1FA2" stroke-width="1.5"/>
      <circle cx="20" cy="15" r="4" fill="none" stroke="#7B1FA2" stroke-width="1.5"/>
    </g>

    <!-- Chunked text representation -->
    <g transform="translate(265, 115)">
      <rect x="0" y="0" width="40" height="8" fill="#E1BEE7" stroke="#7B1FA2" stroke-width="0.5"/>
      <rect x="0" y="10" width="40" height="8" fill="#E1BEE7" stroke="#7B1FA2" stroke-width="0.5"/>
      <rect x="0" y="20" width="40" height="8" fill="#E1BEE7" stroke="#7B1FA2" stroke-width="0.5"/>
    </g>

    <!-- Label -->
    <text x="280" y="175" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#666">
      문서 분할
    </text>
  </g>

  <!-- ARROW 2 -->
  <line x1="360" y1="140" x2="400" y2="140" stroke="url(#flowGradient)" stroke-width="4"/>
  <polygon points="400,140 390,135 390,145" fill="url(#flowGradient)"/>

  <!-- STEP 3: Bedrock Embeddings API -->
  <g id="step3">
    <!-- Box -->
    <rect x="400" y="70" width="150" height="140" fill="#FCE4EC" stroke="#C2185B" stroke-width="2" rx="5"/>

    <!-- Header -->
    <rect x="400" y="70" width="150" height="30" fill="#C2185B" rx="5"/>
    <text x="475" y="92" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="white">
      단계 3:
    </text>
    <text x="475" y="105" font-family="Arial, sans-serif" font-size="9" font-weight="bold" text-anchor="middle" fill="white">
      Bedrock API
    </text>

    <!-- Model name -->
    <rect x="410" y="115" width="130" height="22" fill="#F8BBD0" stroke="#C2185B" stroke-width="1" rx="2"/>
    <text x="475" y="130" font-family="Arial, sans-serif" font-size="8" font-weight="bold" text-anchor="middle" fill="#880E4F">
      Titan Embeddings V2
    </text>

    <!-- Vector output -->
    <rect x="410" y="145" width="130" height="30" fill="white" stroke="#C2185B" stroke-width="1" rx="2"/>
    <text x="475" y="158" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#666">
      [0.12, -0.45, ...]
    </text>
    <text x="475" y="170" font-family="Arial, sans-serif" font-size="7" text-anchor="middle" fill="#999">
      1024차원 벡터
    </text>

    <!-- Label -->
    <text x="475" y="180" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#666">
      벡터 생성
    </text>
  </g>

  <!-- ARROW 3 -->
  <line x1="560" y1="140" x2="600" y2="140" stroke="url(#flowGradient)" stroke-width="4"/>
  <polygon points="600,140 590,135 590,145" fill="url(#flowGradient)"/>

  <!-- STEP 4: Vector Store -->
  <g id="step4">
    <!-- Box -->
    <rect x="600" y="70" width="150" height="140" fill="#E0F2F1" stroke="#00796B" stroke-width="2" rx="5"/>

    <!-- Header -->
    <rect x="600" y="70" width="150" height="30" fill="#00796B" rx="5"/>
    <text x="675" y="92" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="white">
      단계 4:
    </text>
    <text x="675" y="105" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="white">
      벡터 스토어 저장
    </text>

    <!-- Database icon -->
    <g transform="translate(640, 115)">
      <ellipse cx="15" cy="5" rx="13" ry="5" fill="#80CBC4" stroke="#00796B" stroke-width="1"/>
      <rect x="2" y="5" width="26" height="15" fill="#80CBC4" stroke="#00796B" stroke-width="1"/>
      <ellipse cx="15" cy="20" rx="13" ry="5" fill="#80CBC4" stroke="#00796B" stroke-width="1"/>
      <line x1="2" y1="8" x2="2" y2="17" stroke="#00796B" stroke-width="1"/>
      <line x1="28" y1="8" x2="28" y2="17" stroke="#00796B" stroke-width="1"/>
    </g>

    <!-- Storage options -->
    <rect x="610" y="145" width="130" height="28" fill="white" stroke="#00796B" stroke-width="1" rx="2"/>
    <text x="675" y="158" font-family="Arial, sans-serif" font-size="8" font-weight="bold" text-anchor="middle" fill="#00796B">
      OpenSearch /
    </text>
    <text x="675" y="168" font-family="Arial, sans-serif" font-size="8" font-weight="bold" text-anchor="middle" fill="#00796B">
      Pinecone
    </text>

    <!-- Label -->
    <text x="675" y="180" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#666">
      벡터 저장
    </text>
  </g>

  <!-- Metadata annotations -->
  <g id="metadata">
    <!-- Left annotation -->
    <line x1="90" y1="220" x2="90" y2="260" stroke="#FF6B6B" stroke-width="2" stroke-dasharray="3,3"/>
    <rect x="30" y="260" width="120" height="60" fill="#FFE8E8" stroke="#FF6B6B" stroke-width="1.5" rx="4"/>
    <text x="90" y="277" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#C62828" font-weight="bold">
      메타데이터:
    </text>
    <text x="90" y="291" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#666">
      • source (출처)
    </text>
    <text x="90" y="303" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#666">
      • page (페이지)
    </text>
    <text x="90" y="315" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#666">
      • date (날짜)
    </text>

    <!-- Right annotation -->
    <line x1="675" y1="220" x2="675" y2="260" stroke="#FF6B6B" stroke-width="2" stroke-dasharray="3,3"/>
    <rect x="615" y="260" width="120" height="60" fill="#FFE8E8" stroke="#FF6B6B" stroke-width="1.5" rx="4"/>
    <text x="675" y="277" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#C62828" font-weight="bold">
      벡터와 함께 저장:
    </text>
    <text x="675" y="291" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#666">
      원본 텍스트
    </text>
    <text x="675" y="303" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#666">
      메타데이터
    </text>
    <text x="675" y="315" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#666">
      검색 성능 최적화
    </text>
  </g>

  <!-- Bottom info -->
  <rect x="20" y="335" width="810" height="1" fill="#DDD"/>
</svg>
